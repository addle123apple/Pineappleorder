<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狀元鳳梨 - 官網訂購系統</title>
    <style>
        :root { --primary: #e67e22; --secondary: #27ae60; --bg: #fffcf0; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 10px; margin: 0; font-size: 18px; color: #333; }
        .container { max-width: 600px; margin: auto; padding-bottom: 80px; }
        
        .brand-header { text-align: center; padding: 20px 0; }
        .brand-logo { font-size: 40px; font-weight: 900; color: var(--primary); margin: 0; }
        .brand-tagline { font-size: 18px; color: var(--secondary); font-weight: bold; margin-top: 5px; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h3 { border-left: 6px solid var(--primary); padding-left: 12px; font-size: 22px; margin: 15px 0; }
        
        /* 修正格子歪斜與對齊 */
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 18px; background: #fff; }
        
        /* 比例分配：左側下拉選單 40%，右側輸入框 60% */
        .phone-row { display: flex; gap: 8px; width: 100%; }
        .phone-type { width: 40% !important; }
        .phone-input-group { width: 60%; display: flex; gap: 5px; align-items: center; }
        
        .area-code { width: 75px !important; text-align: center; padding: 12px 5px !important; }
        .phone-main { flex: 1; min-width: 0; } /* 防止爆框 */

        .payment-info { background: #fff9f0; border: 2px dashed #f39c12; padding: 15px; border-radius: 12px; margin: 15px 0; display: none; line-height: 1.6; }
        .receiver-block { border: 2px solid #f0f0f0; padding: 15px; border-radius: 18px; margin-bottom: 20px; background: #fff; }
        
        .btn-add { background: #fff; color: var(--secondary); border: 2px solid var(--secondary); padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 18px; margin-bottom: 20px; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-size: 24px; font-weight: bold; cursor: pointer; }
        .locked { background-color: #f8f8f8 !important; color: #999 !important; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1 class="brand-logo">🍍 狀元鳳梨</h1>
        <p class="brand-tagline">在地首選．品質如金</p>
    </div>

    <div class="card">
        <h3>📤 寄件人資訊</h3>
        <label>寄件姓名 *</label>
        <input type="text" id="sName" placeholder="姓名">
        
        <label>聯絡電話 *</label>
        <div class="phone-row">
            <select id="sPhoneType" class="phone-type" onchange="updatePhoneUI('s', this.value)">
                <option value="mobile">手機</option>
                <option value="home">市話</option>
            </select>
            <div id="sPhoneBox" class="phone-input-group">
                <input type="tel" id="sPhone" placeholder="0912345678">
            </div>
        </div>

        <label>付款方式 *</label>
        <select id="payMethod" onchange="document.getElementById('bankInfo').style.display=(this.value=='轉帳'?'block':'none')">
            <option value="現金">現金 (親自交付)</option>
            <option value="轉帳">銀行轉帳</option>
        </select>
        <div id="bankInfo" class="payment-info">
            🏦 <b>匯款資訊：</b><br>
            郵局(700) 大樹九曲堂郵局<br>
            戶名：王黃麗英<br>
            帳號：<b>01012020516864</b><br>
            <span style="color: #d35400; font-size: 16px;">※ 請備註「姓名及數量」以利對帳</span>
        </div>
    </div>

    <div id="receiverContainer"></div>
    <button id="addBtn" class="btn-add" onclick="addReceiver()">＋ 新增另一位收件人</button>
    <button id="submitBtn" class="btn-submit" onclick="submitOrder()">✅ 確認送出訂單</button>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2EBQQs_DmAqlmrQDLedSwPrFThTmpJ-wCFDn8Ve9mZahu_NXOs1UuQwhWfR5iClyluA/exec"; 

    window.onload = () => addReceiver();

    function updatePhoneUI(prefix, type) {
        const box = document.getElementById(prefix + 'PhoneBox');
        box.innerHTML = type === 'mobile' ? 
            `<input type="tel" id="${prefix}Phone" placeholder="0912345678">` : 
            `<input type="tel" id="${prefix}Area" class="area-code" placeholder="區碼"><span>-</span><input type="tel" id="${prefix}Number" class="phone-main" placeholder="號碼">`;
    }

    function addReceiver() {
        const container = document.getElementById('receiverContainer');
        const count = container.children.length + 1;
        const div = document.createElement('div');
        div.className = 'receiver-block';
        let opt = ""; for(let i=1; i<=20; i++) opt += `<option value="${i}">${i} 箱</option>`;
        div.innerHTML = `
            <h3>👤 收件人 #${count}</h3>
            <label>收件姓名 *</label><input type="text" class="rName">
            <label>收件電話 *</label>
            <div class="phone-row">
                <select class="rPhoneType phone-type" onchange="updateRPhoneUI(this)"><option value="mobile">手機</option><option value="home">市話</option></select>
                <div class="rPhoneBox phone-input-group"><input type="tel" class="rPhone" placeholder="0912345678"></div>
            </div>
            <label>收件地址 *</label><textarea class="rAddr" rows="2"></textarea>
            <label>訂購箱數 *</label><select class="rBoxCount">${opt}</select>
            <label>收件備註 (如：中午前送達、週六收貨)</label><input type="text" class="rNote">
        `;
        container.appendChild(div);
    }

    function updateRPhoneUI(select) {
        const box = select.closest('.receiver-block').querySelector('.rPhoneBox');
        box.innerHTML = select.value === 'mobile' ? 
            `<input type="tel" class="rPhone" placeholder="0912345678">` : 
            `<input type="tel" class="rArea" class="area-code" placeholder="區碼"><span>-</span><input type="tel" class="rNumber" class="phone-main" placeholder="號碼">`;
    }

    function getPhoneValue(prefix, block = document) {
        const isS = prefix === 's';
        const type = isS ? document.getElementById('sPhoneType').value : block.querySelector('.rPhoneType').value;
        if (type === 'mobile') return (isS ? document.getElementById('sPhone') : block.querySelector('.rPhone')).value.trim();
        const a = (isS ? document.getElementById('sArea') : block.querySelector('.rArea')).value.trim();
        const n = (isS ? document.getElementById('sNumber') : block.querySelector('.rNumber')).value.trim();
        return (a && n) ? `${a}-${n}` : "";
    }

    function submitOrder() {
        const sName = document.getElementById('sName').value.trim();
        const sPhone = getPhoneValue('s');
        if (!sName || !sPhone) return alert("寄件資訊未填！");

        let receiversData = [];
        document.querySelectorAll('.receiver-block').forEach(b => {
            receiversData.push({ 
                name: b.querySelector('.rName').value.trim(), 
                phone: getPhoneValue('r', b), 
                addr: b.querySelector('.rAddr').value.trim(), 
                boxCount: b.querySelector('.rBoxCount').value, 
                note: b.querySelector('.rNote').value || "無" 
            });
        });

        document.querySelectorAll('input, select, textarea, button').forEach(el => el.classList.add('locked'));
        document.getElementById('submitBtn').innerText = "⏳ 處理中...";

        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST", mode: "no-cors",
            body: new URLSearchParams({ "sName": sName, "sPhone": sPhone, "payMethod": document.getElementById('payMethod').value, "receiversJson": JSON.stringify(receiversData) })
        }).then(() => {
            alert("🎉 訂單成功！");
            document.getElementById('submitBtn').innerText = "✅ 已完成";
        });
    }
</script>
</body>
</html>
