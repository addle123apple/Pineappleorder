<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狀元鳳梨 - 官網訂購系統</title>
    <style>
        :root { --primary: #e67e22; --secondary: #27ae60; --bg: #fffcf0; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 10px; margin: 0; font-size: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; padding-bottom: 80px; }
        .brand-header { text-align: center; padding: 25px 0; }
        .brand-logo { font-size: 45px; font-weight: 900; color: var(--primary); text-shadow: 2px 2px 4px rgba(0,0,0,0.1); margin: 0; }
        .brand-tagline { font-size: 18px; color: var(--secondary); font-weight: bold; margin-top: 5px; letter-spacing: 2px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #eee; }
        h3 { border-left: 8px solid var(--primary); padding-left: 15px; font-size: 26px; color: #444; margin: 25px 0 15px 0; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 20px; margin-bottom: 15px; }
        
        /* 電話比例優化 - 統一比例 30/20/50 */
        .phone-row { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; width: 100%; }
        .phone-type { width: 30% !important; flex-shrink: 0; }
        .phone-input-box { flex-grow: 1; display: flex; gap: 5px; align-items: center; }
        .area-code { width: 75px !important; text-align: center; flex-shrink: 0; }
        .phone-main { flex: 1; min-width: 0; }

        .payment-info { background: #fff9f0; border: 2px dashed var(--primary); padding: 18px; border-radius: 15px; display: none; margin-bottom: 15px; line-height: 1.6; }
        .receiver-block { border: 3px solid #f1f1f1; padding: 20px; border-radius: 20px; margin-bottom: 25px; background: #fff; position: relative; }
        .btn-add { background: #fff; color: var(--secondary); border: 3px solid var(--secondary); padding: 15px; border-radius: 15px; width: 100%; cursor: pointer; font-weight: bold; font-size: 22px; margin-bottom: 30px; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 22px; border-radius: 18px; width: 100%; font-size: 28px; font-weight: bold; cursor: pointer; box-shadow: 0 6px 20px rgba(230,126,34,0.3); }
        .locked { background-color: #f2f2f2 !important; color: #888 !important; border-color: #ddd !important; pointer-events: none; cursor: not-allowed; }
        .remove-link { color: #e74c3c; text-align: right; display: block; margin-top: 5px; font-weight: bold; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1 class="brand-logo">🍍 狀元鳳梨</h1>
        <p class="brand-tagline">在地首選．品質如金</p>
    </div>

    <div class="card">
        <h3>📤 寄件人資訊</h3>
        <label>寄件姓名 *</label>
        <input type="text" id="sName" placeholder="請輸入姓名">
        <label>聯絡電話 *</label>
        <div class="phone-row">
            <select id="sPhoneType" class="phone-type" onchange="updatePhoneUI('s', this.value)" style="margin-bottom:0;">
                <option value="mobile">手機</option>
                <option value="home">市話</option>
            </select>
            <div id="sPhoneBox" class="phone-input-box">
                <input type="tel" id="sPhone" placeholder="09XXXXXXXX" maxlength="10" style="margin-bottom:0;">
            </div>
        </div>
        <label>付款方式 *</label>
        <select id="payMethod" onchange="document.getElementById('bankInfo').style.display=(this.value=='轉帳'?'block':'none')">
            <option value="現金">現金 (親自交付)</option>
            <option value="轉帳">銀行轉帳</option>
        </select>
        <div id="bankInfo" class="payment-info">
            🏦 <b>匯款資訊：</b><br>
            郵局(700) 大樹九曲堂郵局<br>
            戶名：王黃麗英<br>
            帳號：<span style="font-size: 24px; color: #d35400; display: block; margin: 5px 0;"><b>01012020516864</b></span>
            <p style="color: #e67e22; font-weight: bold; margin-top:10px;">※ 請於三日內匯款，並於匯款單上備註寄件人及訂購數量，感謝。</p>
        </div>
    </div>

    <div id="receiverContainer"></div>
    <button id="addBtn" class="btn-add" onclick="addReceiver()">＋ 新增另一位收件人</button>
    <button id="submitBtn" class="btn-submit" onclick="submitOrder()">✅ 確認送出狀元鳳梨訂單</button>
</div>

<script>
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz2EBQQs_DmAqlmrQDLedSwPrFThTmpJ-wCFDn8Ve9mZahu_NXOs1UuQwhWfR5iClyluA/exec"; 

    window.onload = () => addReceiver();

    function updatePhoneUI(prefix, type) {
        const box = document.getElementById(prefix + 'PhoneBox');
        if (type === 'mobile') {
            box.innerHTML = `<input type="tel" id="${prefix}Phone" placeholder="09XXXXXXXX" maxlength="10" style="margin-bottom:0;">`;
        } else {
            box.innerHTML = `<input type="tel" id="${prefix}Area" class="area-code" placeholder="區碼" maxlength="3" style="margin-bottom:0;"> <span>-</span> <input type="tel" id="${prefix}Number" class="phone-main" placeholder="號碼" maxlength="8" style="margin-bottom:0;">`;
        }
    }

    function addReceiver() {
        const container = document.getElementById('receiverContainer');
        const count = container.children.length + 1;
        const div = document.createElement('div');
        div.className = 'receiver-block';
        let opt = ""; for(let i=1; i<=20; i++) opt += `<option value="${i}">${i} 箱</option>`;
        div.innerHTML = `
            <h3>👤 收件人 #${count}</h3>
            <label>收件姓名 *</label><input type="text" class="rName">
            <label>收件電話 *</label>
            <div class="phone-row">
                <select class="rPhoneType phone-type" onchange="updateRPhoneUI(this)" style="margin-bottom:0;"><option value="mobile">手機</option><option value="home">市話</option></select>
                <div class="rPhoneBox phone-input-box"><input type="tel" class="rPhone" placeholder="09XXXXXXXX" maxlength="10" style="margin-bottom:0;"></div>
            </div>
            <label>收件地址 *</label><textarea class="rAddr" rows="2" placeholder="請填寫完整地址 (含縣市鄉鎮門牌)"></textarea>
            <label>訂購箱數 *</label><select class="rBoxCount">${opt}</select>
            <label>收件備註 (如：中午前送達、週六收貨)</label><input type="text" class="rNote">
            ${count > 1 ? `<span class="remove-link" onclick="this.parentElement.remove()">✕ 移除此收件人</span>` : ''}
        `;
        container.appendChild(div);
    }

    function updateRPhoneUI(select) {
        const box = select.closest('.receiver-block').querySelector('.rPhoneBox');
        if (select.value === 'mobile') {
            box.innerHTML = `<input type="tel" class="rPhone" placeholder="09XXXXXXXX" maxlength="10" style="margin-bottom:0;">`;
        } else {
            box.innerHTML = `<input type="tel" class="rArea" class="area-code" placeholder="區碼" maxlength="3" style="margin-bottom:0;"> <span>-</span> <input type="tel" class="rNumber" class="phone-main" placeholder="號碼" maxlength="8" style="margin-bottom:0;">`;
        }
    }

    function validatePhone(type, val1, val2 = "") {
        if (type === 'mobile') {
            return /^09\d{8}$/.test(val1);
        } else {
            return val1.length >= 2 && val2.length >= 7;
        }
    }

    // 地址檢核邏輯
    function validateAddress(addr) {
        // 檢查是否包含「縣或市」且包含「區或鄉或鎮或市」且包含「號」
        const hasCity = /縣|市/.test(addr);
        const hasDistrict = /區|鄉|鎮|市/.test(addr);
        const hasNo = /號/.test(addr);
        return hasCity && hasDistrict && hasNo;
    }

    function getPhoneData(prefix, block = document) {
        const isS = prefix === 's';
        const type = isS ? document.getElementById('sPhoneType').value : block.querySelector('.rPhoneType').value;
        if (type === 'mobile') {
            const val = (isS ? document.getElementById('sPhone') : block.querySelector('.rPhone')).value.trim();
            return { type: 'mobile', v1: val, v2: "", isValid: validatePhone('mobile', val) };
        } else {
            const a = (isS ? document.getElementById('sArea') : block.querySelector('.rArea')).value.trim();
            const n = (isS ? document.getElementById('sNumber') : block.querySelector('.rNumber')).value.trim();
            return { type: 'home', v1: a, v2: n, isValid: validatePhone('home', a, n) };
        }
    }

    function submitOrder() {
        const sName = document.getElementById('sName').value.trim();
        const sP = getPhoneData('s');
        
        if (!sName) return alert("請填寫寄件人姓名");
        if (!sP.isValid) return alert("寄件人電話格式錯誤！\n手機請填 10 碼 (09...)，市話請含區碼。");

        let receiversData = [];
        const blocks = document.querySelectorAll('.receiver-block');
        for (let b of blocks) {
            const name = b.querySelector('.rName').value.trim();
            const rP = getPhoneData('r', b);
            const addr = b.querySelector('.rAddr').value.trim();
            
            if (!name) return alert("請輸入收件人姓名");
            if (!rP.isValid) return alert(`收件人 ${name} 的電話格式錯誤！`);
            
            // 地址檢核
            if (!validateAddress(addr)) {
                return alert(`收件人 ${name} 的地址資訊不完整！\n請填寫完整縣市、鄉鎮市區及門牌號碼。`);
            }
            
            receiversData.push({ 
                name, phone: rP.type === 'mobile' ? rP.v1 : `${rP.v1}-${rP.v2}`, 
                addr, boxCount: b.querySelector('.rBoxCount').value, 
                note: b.querySelector('.rNote').value || "無" 
            });
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "⏳ 正在與系統連線中...";

        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST", mode: "no-cors",
            body: new URLSearchParams({ 
                "sName": sName, "sPhone": sP.type === 'mobile' ? sP.v1 : `${sP.v1}-${sP.v2}`, 
                "payMethod": document.getElementById('payMethod').value, 
                "receiversJson": JSON.stringify(receiversData) 
            })
        }).then(() => {
            document.querySelectorAll('.remove-link').forEach(el => el.remove());
            document.querySelectorAll('input, select, textarea, button').forEach(el => {
                el.classList.add('locked');
                el.disabled = true;
            });
            alert("🎉 狀元鳳梨訂單已送出成功！\n感謝您的訂購。");
            submitBtn.innerText = "✅ 訂單已完成送出";
        }).catch(err => {
            submitBtn.disabled = false;
            submitBtn.innerText = "❌ 送出失敗，請重試";
            alert("連線發生問題，請檢查網路後重新送出。");
        });
    }
</script>
</body>
</html>
