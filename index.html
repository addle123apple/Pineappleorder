<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍍 鳳梨宅配下單系統</title>
    <style>
        :root { --primary: #00b900; --bg: #f4f7f6; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; padding-bottom: 50px; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { text-align: center; color: var(--primary); margin-top: 10px; }
        h3 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 18px; color: #333; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 5px rgba(0,185,0,0.2); }
        .receiver-block { border: 2px dashed #ddd; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #fffdf9; position: relative; }
        .btn-add { background: white; color: var(--primary); border: 2px solid var(--primary); padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 25px; font-size: 16px; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 8px; width: 100%; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,185,0,0.3); }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        .btn-remove { color: #ff4d4d; font-size: 13px; cursor: pointer; display: block; text-align: right; margin-top: 8px; font-weight: bold; }
        #loading { display: none; text-align: center; color: #555; margin: 15px 0; font-weight: bold; }
        .hint { font-size: 12px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>🍍 鳳梨宅配下單系統</h2>
        <p style="text-align: center; font-size: 14px; color: #666;">填寫後點擊下方送出，資料將自動存檔</p>
        <hr style="border: 0.5px solid #eee; margin: 20px 0;">
       
        <h3>📤 寄件人資訊</h3>
        <div class="form-group">
            <label>寄件人姓名 *</label>
            <input type="text" id="sName" placeholder="請輸入您的姓名">
        </div>
        <div class="form-group">
            <label>寄件人電話 *</label>
            <input type="tel" id="sPhone" placeholder="例如：0912345678">
            <div class="hint">需為 09 開頭 10 位數字</div>
        </div>
        <div class="form-group">
            <label>總備註 (選填)</label>
            <input type="text" id="note" placeholder="例如：請盡量中午前送達">
        </div>
    </div>

    <div id="receiverContainer"></div>

    <button class="btn-add" onclick="addReceiver()">＋ 新增另一筆收件人</button>
   
    <div id="loading">⏳ 正在處理訂單，請稍候...</div>
    <button id="submitBtn" class="btn-submit" onclick="submitOrder()">🚀 檢查並送出訂單</button>
</div>

<script>
    // ⚠️ 請在此處貼上你「重新部署」後的最新 GAS 網址
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXYS_pNpcjn0jspyJuV-_2dLrMGFvF-k-oH1-CDPzRKLnBS2fq5Z7pWT87VChF5YUIkQ/exec";

    let receiverCount = 0;
    window.onload = () => addReceiver();

    function addReceiver() {
        receiverCount++;
        const container = document.getElementById('receiverContainer');
        const div = document.createElement('div');
        div.className = 'receiver-block';
        div.id = `receiver_${receiverCount}`;
        div.innerHTML = `
            <h3>👤 收件人 #${receiverCount}</h3>
            <div class="form-group"><label>收件人姓名 *</label><input type="text" class="rName"></div>
            <div class="form-group"><label>收件人電話 *</label><input type="tel" class="rPhone"></div>
            <div class="form-group"><label>完整收件地址 *</label>
                <textarea class="rAddr" rows="2" placeholder="需包含縣市及門牌號碼"></textarea>
                <div class="hint">必須包含「路/街/巷」及「號」。</div>
            </div>
            ${receiverCount > 1 ? `<span class="btn-remove" onclick="removeReceiver(${receiverCount})">✕ 移除這筆</span>` : ''}
        `;
        container.appendChild(div);
    }

    function removeReceiver(id) { document.getElementById(`receiver_${id}`).remove(); }

    function submitOrder() {
        const sName = document.getElementById('sName').value.trim();
        const sPhone = document.getElementById('sPhone').value.trim();
        const note = document.getElementById('note').value.trim() || "無";
        const phoneRegex = /^09\d{8}$/;
        const addrCheck = /^(?=.*[路街巷])(?=.*[號]).+$/;
        const simplifiedCheck = /[体国门区发]/;

        if (!sName || !phoneRegex.test(sPhone)) return alert("寄件人資料有誤！");

        let receiversData = [];
        let copyTextDetail = "";
        const blocks = document.querySelectorAll('.receiver-block');

        for (let i = 0; i < blocks.length; i++) {
            const name = blocks[i].querySelector('.rName').value.trim();
            const phone = blocks[i].querySelector('.rPhone').value.trim();
            const addr = blocks[i].querySelector('.rAddr').value.trim();
           
            if (!name || !phoneRegex.test(phone) || !addrCheck.test(addr) || simplifiedCheck.test(addr)) {
                return alert(`收件人 #${i+1} 資料有誤或包含簡體字。地址需有「路/街/巷」及「號」。`);
            }
            receiversData.push({ name, phone, addr });
            copyTextDetail += `【收件人${i+1}】${name} / ${phone} / ${addr}\n`;
        }

        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        btn.disabled = true;
        loading.style.display = 'block';

        const formData = new URLSearchParams({
            "sName": sName, "sPhone": sPhone, "note": note,
            "receiversJson": JSON.stringify(receiversData)
        });

        // 非同步傳送，不使用 await 以防網頁卡住
        fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", body: formData });

        setTimeout(async () => {
            const copyText = `【宅配下單】\n寄件：${sName}(${sPhone})\n內容：\n${copyTextDetail}備註：${note}`;
            try { await navigator.clipboard.writeText(copyText); } catch (err) {}

            loading.style.display = 'none';
            btn.disabled = false;
            alert("✅ 訂單已傳送至雲端試算表！\n\n文字已自動複製，請回 Line 貼上傳送即可。");
        }, 800);
    }
</script>

</body>
</html>
