<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宅配訂單自動提交系統</title>
    <style>
        :root { --primary: #00b900; --bg: #f4f7f6; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { text-align: center; color: var(--primary); }
        h3 { border-left: 5px solid var(--primary); padding-left: 10px; font-size: 18px; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .receiver-block { border: 2px dashed #ddd; padding: 15px; border-radius: 10px; margin-bottom: 15px; background: #fffdf9; position: relative; }
        .btn-add { background: white; color: var(--primary); border: 2px solid var(--primary); padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 8px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        .btn-remove { color: #ff4d4d; font-size: 12px; cursor: pointer; display: block; text-align: right; margin-top: 5px; }
        #loading { display: none; text-align: center; color: #555; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>📦 宅配快速下單</h2>
        <h3>📤 寄件人 (必填)</h3>
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="sName" placeholder="寄件人姓名">
        </div>
        <div class="form-group">
            <label>電話 *</label>
            <input type="tel" id="sPhone" placeholder="0912345678">
        </div>
    </div>

    <div id="receiverContainer"></div>

    <button class="btn-add" onclick="addReceiver()">＋ 新增另一筆收件人</button>
    <button id="submitBtn" class="btn-submit" onclick="submitOrder()">🚀 檢查並自動送出訂單</button>
   
    <div id="loading">⏳ 正在連線至雲端試算表，請稍候...</div>
</div>

<script>
    // 1. 在這裡貼上你的 Google 部署網址
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHcc3hMxbgRzXbLZEyl5tWwgq5I-N4zrVJkAi6e5yYZyodkqQcQlgYWsftoaEXDjcl2g/exec";

    let receiverCount = 0;
    window.onload = () => addReceiver();

    function addReceiver() {
        receiverCount++;
        const container = document.getElementById('receiverContainer');
        const div = document.createElement('div');
        div.className = 'receiver-block';
        div.id = `receiver_${receiverCount}`;
        div.innerHTML = `
            <h3>👤 收件人 #${receiverCount}</h3>
            <div class="form-group"><label>收件姓名 *</label><input type="text" class="rName"></div>
            <div class="form-group"><label>收件電話 *</label><input type="tel" class="rPhone"></div>
            <div class="form-group"><label>收件地址 *</label><textarea class="rAddr" rows="2"></textarea></div>
            ${receiverCount > 1 ? `<span class="btn-remove" onclick="removeReceiver(${receiverCount})">✕ 移除這筆</span>` : ''}
        `;
        container.appendChild(div);
    }

    function removeReceiver(id) { document.getElementById(`receiver_${id}`).remove(); }

    async function submitOrder() {
        const sName = document.getElementById('sName').value.trim();
        const sPhone = document.getElementById('sPhone').value.trim();
        const phoneRegex = /^09\d{8}$/;
        const addrCheck = /^(?=.*[路街巷])(?=.*[號]).+$/;
        const simplifiedCheck = /[体国门区发]/;

        // 基礎檢核
        if (!sName || !phoneRegex.test(sPhone)) return alert("寄件人資料錯誤或電話格式不符(09開頭10位數字)");

        let orderSummary = "";
        const blocks = document.querySelectorAll('.receiver-block');
        for (let i = 0; i < blocks.length; i++) {
            const name = blocks[i].querySelector('.rName').value.trim();
            const phone = blocks[i].querySelector('.rPhone').value.trim();
            const addr = blocks[i].querySelector('.rAddr').value.trim();
            if (!name || !phoneRegex.test(phone) || !addrCheck.test(addr) || simplifiedCheck.test(addr)) {
                return alert(`收件人 #${i+1} 資料有誤或包含簡體字/格式不全，請重新檢查。`);
            }
            orderSummary += `【收件人${i+1}】${name} / ${phone} / ${addr}\n`;
        }

        // 開始送出
        const btn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        btn.disabled = true;
        loading.style.display = 'block';

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: new URLSearchParams({ "sName": sName, "sPhone": sPhone, "orderDetail": orderSummary })
            });

            // 自動複製備份
            const copyText = `【下單通知】\n寄件人：${sName}(${sPhone})\n訂單內容：\n${orderSummary}`;
            await navigator.clipboard.writeText(copyText);

            alert("✅ 訂單已自動存入雲端試算表！\n\n同時已為您複製訂單備份，請回到 Line 貼上傳送給賣家做雙重確認。");
        } catch (e) {
            alert("雲端傳送失敗，請手動複製文字傳給賣家。");
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
